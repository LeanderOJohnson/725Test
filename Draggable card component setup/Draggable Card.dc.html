<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/fonts.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/colors.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/typography.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/spacing.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/base.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/components.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/tokens/components-layout.css">
<link rel="stylesheet" href="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/styles.css">
<script src="_ds/design-system-kit-35cd19c1-52e1-43d1-9d9c-8b13ab3720d0/_ds_bundle.js"></script>
</helmet>
<div draggable="{{ draggable }}" onDragStart="{{ onDragStart }}" onDragEnd="{{ onDragEnd }}" onMouseEnter="{{ onEnter }}" onMouseLeave="{{ onLeave }}" onMouseDown="{{ onPress }}" onMouseUp="{{ onRelease }}" style="{{ cardStyle }}">
  <sc-if value="{{ showGrip }}" hint-placeholder-val="{{ true }}">
    <span aria-hidden="true" style="color:var(--color-neutral-50);flex-shrink:0;display:flex;align-items:center;"><svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><circle cx="9" cy="6" r="1.6"></circle><circle cx="15" cy="6" r="1.6"></circle><circle cx="9" cy="12" r="1.6"></circle><circle cx="15" cy="12" r="1.6"></circle><circle cx="9" cy="18" r="1.6"></circle><circle cx="15" cy="18" r="1.6"></circle></svg></span>
  </sc-if>
  <div style="flex:1;min-width:0;display:flex;flex-direction:column;gap:1px;">
    <div style="font-size:13px;font-weight:600;color:var(--color-text-body);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ title }}</div>
    <div style="font-family:var(--font-primary);font-size:var(--text-body-sm-size);line-height:var(--text-body-sm-height);color:var(--color-text-hint);font-variant-numeric:tabular-nums;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">{{ meta }}</div>
  </div>
  <sc-if value="{{ showEdit }}" hint-placeholder-val="{{ true }}">
    <x-import component-from-global-scope="LumaFluxDesignSystem_35cd19.Button" variant="tertiary" size="small" class-name="lf-btn--icon-only" aria-label="Edit component" onClick="{{ onEdit }}" hint-size="24px,24px"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"></path><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4z"></path></svg></x-import>
  </sc-if>
  <sc-if value="{{ showAdd }}" hint-placeholder-val="{{ true }}">
    <x-import component-from-global-scope="LumaFluxDesignSystem_35cd19.Button" variant="secondary" size="small" class-name="lf-btn--icon-only" aria-label="Add component" onClick="{{ onAdd }}" hint-size="24px,24px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="M12 5v14M5 12h14"></path></svg></x-import>
  </sc-if>
  <sc-if value="{{ showRemove }}" hint-placeholder-val="{{ false }}">
    <x-import component-from-global-scope="LumaFluxDesignSystem_35cd19.Button" variant="tertiary" size="small" class-name="lf-btn--icon-only" aria-label="Remove from selection" onClick="{{ onRemove }}" hint-size="24px,24px"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M18 6 6 18M6 6l12 12"></path></svg></x-import>
  </sc-if>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 300, &quot;height&quot;: 62 },
  &quot;title&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Cap Rate Sleeve&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;meta&quot;: { &quot;editor&quot;: &quot;text&quot;, &quot;default&quot;: &quot;Structured · 3 fields&quot;, &quot;tsType&quot;: &quot;string&quot; },
  &quot;state&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;default&quot;: &quot;default&quot;, &quot;options&quot;: [&quot;default&quot;, &quot;hover&quot;, &quot;dragging&quot;, &quot;selected&quot;, &quot;disabled&quot;], &quot;tsType&quot;: &quot;'default' | 'hover' | 'dragging' | 'selected' | 'disabled'&quot; },
  &quot;showGrip&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Actions&quot; },
  &quot;showEdit&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Actions&quot; },
  &quot;showAdd&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: true, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Actions&quot; },
  &quot;showRemove&quot;: { &quot;editor&quot;: &quot;boolean&quot;, &quot;default&quot;: false, &quot;tsType&quot;: &quot;boolean&quot;, &quot;section&quot;: &quot;Actions&quot; },
  &quot;onEdit&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot; },
  &quot;onAdd&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot; },
  &quot;onRemove&quot;: { &quot;editor&quot;: null, &quot;tsType&quot;: &quot;() =&gt; void&quot; }
}">
class Component extends DCLogic {
  state = { dragging: false, hovered: false };
  renderVals() {
    const p = this.props;
    const st = p.state || 'default';
    const isDisabled = st === 'disabled';
    const isSelected = st === 'selected';
    const isHover = st === 'hover';
    const isDragging = st === 'dragging' || this.state.dragging || this.state.pressed;
    const draggable = !isDisabled;

    let bg = 'var(--color-surface-tertiary)';
    let border = '1px solid transparent';
    let boxShadow = 'none';
    let opacity = 1;
    let transform = 'none';
    let cursor = draggable ? 'grab' : 'default';

    if (isHover) {
      border = '1px solid var(--color-stroke-default)';
      boxShadow = 'var(--shadow-card)';
      transform = 'translateY(-2px)';
    }
    if (isSelected) {
      bg = 'var(--color-surface-info)';
      border = '1px solid var(--color-blue-50)';
    }
    if (isDragging) {
      bg = 'var(--color-surface-tertiary)';
      border = '1px solid var(--color-blue-50)';
      boxShadow = 'var(--shadow-card)';
      opacity = 0.92;
      transform = 'rotate(-2deg)';
      cursor = 'grabbing';
    }
    if (isDisabled) {
      opacity = 0.5;
      cursor = 'not-allowed';
    }

    // Real hover lift — only for the resting states (not selected/dragging/disabled).
    const hoverable = st === 'default' || st === 'hover';
    if (hoverable && this.state.hovered && !isDragging) {
      border = '1px solid var(--color-stroke-default)';
      boxShadow = 'var(--shadow-card)';
      transform = 'translateY(-2px)';
    }

    const cardStyle = {
      display: 'flex',
      alignItems: 'center',
      gap: '8px',
      padding: '10px 12px',
      borderRadius: '8px',
      background: bg,
      border,
      boxShadow,
      opacity,
      transform,
      cursor,
      pointerEvents: isDisabled ? 'none' : 'auto',
      userSelect: 'none',
      transition: 'box-shadow .15s ease, transform .15s ease, background-color .12s ease, border-color .12s ease',
      width: '100%',
      boxSizing: 'border-box',
    };

    return {
      onEnter: () => { if (hoverable && !this.state.hovered) this.setState({ hovered: true }); },
      onLeave: () => { if (this.state.hovered || this.state.pressed) this.setState({ hovered: false, pressed: false }); },
      onPress: () => { if (!isDisabled) this.setState({ pressed: true }); },
      onRelease: () => { if (this.state.pressed) this.setState({ pressed: false }); },
      title: p.title ?? 'Cap Rate Sleeve',
      meta: p.meta ?? 'Structured · 3 fields',
      showGrip: p.showGrip ?? true,
      showEdit: p.showEdit ?? true,
      showAdd: p.showAdd ?? true,
      showRemove: p.showRemove ?? false,
      draggable,
      cardStyle,
      onDragStart: (e) => {
        if (!draggable) { e.preventDefault(); return; }
        try {
          e.dataTransfer.setData('text/plain', p.title || 'component');
          e.dataTransfer.effectAllowed = 'copy';
        } catch (_) {}
        this.setState({ dragging: true });
      },
      onDragEnd: () => this.setState({ dragging: false }),
      onEdit: (e) => { e && e.stopPropagation(); (p.onEdit || (() => {}))(); },
      onAdd: (e) => { e && e.stopPropagation(); (p.onAdd || (() => {}))(); },
      onRemove: (e) => { e && e.stopPropagation(); (p.onRemove || (() => {}))(); },
    };
  }
}
</script>
</body>
</html>
