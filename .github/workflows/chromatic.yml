name: Publish to Chromatic

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  chromatic:
    name: Run Chromatic
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Required for Chromatic to detect changes

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Publish to Chromatic
        uses: chromaui/action@v12
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          # Store your token as a GitHub secret named CHROMATIC_PROJECT_TOKEN
          # Project token: chpt_4781542db92769e (add to GitHub → Settings → Secrets)
          # Only auto-accept changes on main (merged PRs)
          # On PRs, changes require your approval in the Chromatic UI
          autoAcceptChanges: main
